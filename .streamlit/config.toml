[server]
headless = true
enableXsrfProtection = true
maxUploadSize = 200          # MB — handles large score matrices (36 k × 18 ≈ 2.5 MB)

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#2a9d8f"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f5f5"
textColor = "#1a1a2e"
font = "sans serif"

[runner]
fastReruns = true
